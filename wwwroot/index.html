<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>ChatExpress</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f0f2f5; }
    header { background: #075e54; color: white; padding: 1rem; text-align: center; font-size: 1.2rem; }
    #mensajes { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .burbuja { max-width: 60%; padding: 0.5rem 0.8rem; border-radius: 10px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .burbuja.sistema { align-self: center; background: #e1f5fe; font-size: 0.8rem; color: #555; }
    .burbuja .nombre { font-weight: bold; font-size: 0.75rem; color: #075e54; margin-bottom: 2px; }
    footer { display: flex; padding: 0.75rem; gap: 0.5rem; background: white; border-top: 1px solid #ddd; }
    footer input { flex: 1; padding: 0.5rem; border: 1px solid #ccc; border-radius: 20px; outline: none; }
    footer button { padding: 0.5rem 1rem; background: #075e54; color: white; border: none; border-radius: 20px; cursor: pointer; }
  </style>
</head>
<body>
  <header>💬 ChatExpress</header>
  <div id="mensajes"></div>
  <footer>
    <input id="usuario" placeholder="Tu nombre" style="max-width:130px" />
    <input id="texto" placeholder="Escribe un mensaje..." />
    <button onclick="enviar()">Enviar</button>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
  <script>
    const connection = new signalR.HubConnectionBuilder()
      .withUrl("/chathub")
      .withAutomaticReconnect()
      .build();

    connection.on("RecibirMensaje", (usuario, mensaje) => {
      const div = document.getElementById("mensajes");
      const burbuja = document.createElement("div");
      burbuja.className = "burbuja" + (usuario === "Sistema" ? " sistema" : "");
      burbuja.innerHTML = usuario !== "Sistema"
        ? `<div class="nombre">${usuario}</div>${mensaje}`
        : mensaje;
      div.appendChild(burbuja);
      div.scrollTop = div.scrollHeight;
    });

    connection.start().catch(err => console.error(err));

    function enviar() {
      const usuario = document.getElementById("usuario").value || "Anónimo";
      const texto = document.getElementById("texto").value.trim();
      if (!texto) return;
      connection.invoke("EnviarMensaje", usuario, texto);
      document.getElementById("texto").value = "";
    }

    document.getElementById("texto").addEventListener("keydown", e => {
      if (e.key === "Enter") enviar();
    });
  </script>
</body>
</html>
